<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">M8 Genesis Collectible Drop</title>
  <desc id="desc">A futuristic token collectible artwork with a glowing M8 emblem, rings, and holographic grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120b1f"/>
      <stop offset="100%" stop-color="#17324f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="55%" stop-color="#ff7a59"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect y="540" width="1200" height="360" fill="#09111b"/>
  <g stroke="#345b78" opacity=".45">
    <path d="M0 600h1200M0 660h1200M0 720h1200M0 780h1200"/>
    <path d="M120 540v360M240 540v360M360 540v360M480 540v360M600 540v360M720 540v360M840 540v360M960 540v360M1080 540v360"/>
  </g>
  <circle cx="600" cy="370" r="210" fill="url(#glow)"/>
  <circle cx="600" cy="370" r="170" fill="none" stroke="#f0c96e" stroke-width="18"/>
  <circle cx="600" cy="370" r="120" fill="none" stroke="#67e8f9" stroke-width="6" stroke-dasharray="18 12"/>
  <text x="600" y="402" text-anchor="middle" fill="#fff6d5" font-size="150" font-family="Arial, sans-serif" font-weight="700">M8</text>
  <text x="120" y="760" fill="#d9f4ff" font-size="58" font-family="Arial, sans-serif" font-weight="700">M8 GENESIS COLLECTIBLE DROP</text>
</svg>
